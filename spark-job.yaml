apiVersion: batch/v1
kind: Job
metadata:
  name: spark-stream
  namespace: transaction-fraud
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: spark
        image: apache/spark:3.5.0
        command:
        - /opt/spark/bin/spark-submit
        - --conf
        - spark.jars.ivy=/tmp/.ivy2
        - --packages
        - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.3
        - /app/spark-stream.py
        volumeMounts:
        - name: script-volume
          mountPath: /app
      volumes:
      - name: script-volume
        configMap:
          name: spark-script
